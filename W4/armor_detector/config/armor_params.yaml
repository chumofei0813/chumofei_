armor_detector_node:
  ros__parameters:
    image_topic: "/image_raw"   # 相机图像话题名
    debug: true                 # 是否发布调试图像

    # Gamma矫正
    gamma: 1.0

    # 颜色分离（HSV）
    red_h_low1: 0
    red_h_high1: 30
    red_h_low2: 170
    red_h_high2: 180
    red_s_low: 50
    red_v_low: 30

    blue_h_low: 70
    blue_h_high: 140
    blue_s_low: 120
    blue_v_low: 50

    # 颜色mask形态学（先闭后开）
    morph_color_close_size: 1
    morph_color_open_size: 1

    # 过曝提取
    use_overexpose: false
    overexpose_thresh: 220

    # 最终mask形态学
    morph_final_close_size: 1
    morph_final_open_size: 1

    # 灯条筛选
    light_area_min: 5.0
    light_area_max: 5000.0
    light_ratio_min: 2.0
    light_ratio_max: 20.0
    light_angle_min: 70.0
    light_angle_max: 110.0

    # 灯条配对
    pair_ang_diff_max: 30.0
    pair_h_diff_max: 0.6
    pair_dy_ratio_max: 0.8
    pair_dx_ratio_min: 0.8
    pair_dx_ratio_max: 5.0

    # 装甲板宽高比
    armor_ratio_min: 0.7
    armor_ratio_max: 3.5
